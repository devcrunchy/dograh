services:
  dograh-init:
    image: bash:5.2
    container_name: dograh_init
    profiles: ["remote", "local-turn"]
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      SERVER_IP: "${SERVER_IP:-}"
      PUBLIC_HOST: "${PUBLIC_HOST:-}"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-}"
      BACKEND_API_ENDPOINT: "${BACKEND_API_ENDPOINT:-http://localhost:8000}"
      MINIO_PUBLIC_ENDPOINT: "${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}"
      TURN_HOST: "${TURN_HOST:-}"
      TURN_SECRET: "${TURN_SECRET:-}"
      FASTAPI_WORKERS: "${FASTAPI_WORKERS:-1}"
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./deploy:/workspace/deploy:ro
      - ./certs:/certs:ro
      - nginx-generated:/generated/nginx
      - coturn-generated:/generated/coturn
    command:
      - /workspace/scripts/run_dograh_init.sh

  coturn:
    image: coturn/coturn:4.8.0
    container_name: coturn
    restart: unless-stopped
    profiles: ["remote", "local-turn"]
    depends_on:
      dograh-init:
        condition: service_completed_successfully
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - coturn-generated:/etc/coturn:ro
    command:
      - -c
      - /etc/coturn/turnserver.conf
    networks:
      - app-network

  api:
    # Pinned to a known-good tag — the :latest UI image (2026-06-25) ships a
    # broken /app/package.json that crash-loops. Override with DOGRAH_TAG if needed.
    image: ${REGISTRY:-dograhai}/dograh-api:${DOGRAH_TAG:-1.37.0}
    restart: unless-stopped
    volumes:
      - shared-tmp:/tmp
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-local}"
      LOG_LEVEL: "INFO"
      BACKEND_API_ENDPOINT: "${BACKEND_API_ENDPOINT:-http://localhost:8000}"

      # ── Database & Redis — EXTERNAL (set in Dokploy env) ──
      # Postgres MUST use the asyncpg driver:
      #   postgresql+asyncpg://USER:PASS@calling-postgres:5432/dograh
      DATABASE_URL: "${DATABASE_URL}"
      # redis://:PASS@calling-redis:6379
      REDIS_URL: "${REDIS_URL}"

      # ── Storage — RustFS / S3 (set in Dokploy env) ──
      ENABLE_AWS_S3: "${ENABLE_AWS_S3:-true}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
      AWS_SESSION_TOKEN: "${AWS_SESSION_TOKEN:-}"
      S3_BUCKET: "${S3_BUCKET:-}"
      S3_REGION: "${S3_REGION:-us-east-1}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-}"
      S3_SIGNATURE_VERSION: "${S3_SIGNATURE_VERSION:-s3v4}"
      S3_ADDRESSING_STYLE: "${S3_ADDRESSING_STYLE:-path}"

      FASTAPI_WORKERS: "${FASTAPI_WORKERS:-1}"
      FORWARDED_ALLOW_IPS: "*"

      # TURN (WebRTC) — set TURN_HOST/TURN_SECRET for browser web calls
      TURN_HOST: "${TURN_HOST:-}"
      TURN_SECRET: "${TURN_SECRET:-}"
      FORCE_TURN_RELAY: "${FORCE_TURN_RELAY:-false}"

      OSS_JWT_SECRET: "${OSS_JWT_SECRET:?OSS_JWT_SECRET must be set to a strong secret}"

      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      POSTHOG_API_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.i.posthog.com"
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:8000/api/v1/health'').read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - app-network

  ui:
    image: ${REGISTRY:-dograhai}/dograh-ui:${DOGRAH_TAG:-1.37.0}
    restart: unless-stopped
    environment:
      HOSTNAME: "0.0.0.0"
      BACKEND_URL: "${BACKEND_URL:-http://api:8000}"
      NODE_ENV: "oss"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
      POSTHOG_KEY: "phc_ItizB1dP6yv7ZYobbcqrpxTdbomDA8hJFSEmAMdYvIr"
      POSTHOG_HOST: "https://us.posthog.com"
    ports:
      - "3010:3010"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3010 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app-network

volumes:
  shared-tmp:
    driver: local
  nginx-generated:
    driver: local
  coturn-generated:
    driver: local

networks:
  app-network:
    driver: bridge
