# Internal reverse proxy for the Dokploy deployment.
#
# Why this exists: Dokploy/Traefik terminates TLS and routes the whole domain
# to ONE service. The dograh UI (Next.js) proxies /api over HTTP but CANNOT
# proxy WebSocket upgrades, so the web-call signaling WS 502'd. This nginx is
# the single entrypoint Traefik routes to; it splits traffic the same way
# dograh's bundled nginx did: /api/* -> api (uvicorn, with WS upgrade),
# everything else -> ui. TLS is NOT handled here (Traefik already did it).
server {
    listen 80;
    server_name _;

    # Backend API + WebSockets — bypass the UI, straight to uvicorn.
    # MUST be /api/v1/ (not /api/): the Next.js UI has its OWN routes under
    # /api/ (e.g. /api/config/version, the health check the UI calls). Only the
    # uvicorn backend lives under /api/v1/. Using /api/ here stole the UI's own
    # routes and made the UI report "Backend not reachable at unknown".
    location /api/v1/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade (signaling + audio streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Public edge is HTTPS (Traefik); tell the app so it builds wss:// URLs.
        proxy_set_header X-Forwarded-Proto https;

        # Long-lived WebSockets
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        client_max_body_size 100M;
    }

    location / {
        proxy_pass http://ui:3010;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
